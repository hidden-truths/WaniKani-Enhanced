# wk-enhanced-api Docker Compose stack.
#
# Single-service deployment — Cloudflare Tunnel + DO Spaces stay external
# (the tunnel lives on the host, talking to 127.0.0.1:3000; Spaces is just
# an outbound HTTPS dependency the container reaches like any other).
#
# Used by the host-side systemd unit `wk-enhanced-api.service` which runs
# `docker compose up -d --remove-orphans` on boot and `docker compose down`
# on stop. Day-to-day debugging is `docker compose logs -f api` from the
# repo checkout at /opt/wk-enhanced-api/wk-enhanced-api.
#
# Dev workflow is unchanged — `bun dev` is still the fastest iteration
# loop. Use this Compose file when you want to verify the prod-equivalent
# container behavior locally (`docker compose up --build`); otherwise
# Bun-on-the-host is fine.

services:
  api:
    # Built from the Dockerfile in this directory. If a registry-published
    # image exists locally under this tag (e.g. after `docker compose pull`
    # once CI is publishing), Compose uses it; otherwise the `build:`
    # block triggers a local build. Either way `docker compose up` does
    # the right thing.
    image: wk-enhanced-api:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wk-enhanced-api
    restart: unless-stopped

    # Bind to 127.0.0.1 only — public ingress flows through Cloudflare
    # Tunnel on the host (cloudflared talks to 127.0.0.1:3000, then to
    # the container via this published port). Exposing 0.0.0.0 would
    # leak the API past the tunnel.
    ports:
      - "127.0.0.1:3000:3000"

    # All runtime config (S3 creds, ADMIN_TOKEN, etc.) comes from an env
    # file injected into the container. Defaults to the repo's `./.env`
    # (the dev workflow created by `cp .env.example .env`), so a plain
    # `docker compose up` from a fresh checkout Just Works. Prod overrides
    # this by setting ENV_FILE=/etc/wk-enhanced-api/env in the systemd
    # unit's Environment= directive (see deploy/wk-enhanced-api.service);
    # that file is chmod 600 root-only and the same path the pre-Docker
    # bare-metal unit's EnvironmentFile= used, so no env-file rewrite is
    # needed when migrating an existing droplet.
    env_file:
      - ${ENV_FILE:-./.env}

    # Hard-coded paths for the writable state inside the container. These
    # override whatever the env_file says (Compose applies `environment:`
    # AFTER `env_file:`) so the SQLite + local-driver media live under the
    # bind mount regardless of what the host-side .env points at. Without
    # this, a dev `.env` whose DATABASE_FILE is `./dev-data/...` (relative,
    # correct for `bun dev`) would resolve inside the container to
    # `/app/dev-data/...` — a root-owned directory the uid-1000 `bun` user
    # can't write to.
    environment:
      DATABASE_FILE: /var/lib/wk-enhanced-api/wk-enhanced-api.sqlite
      LOCAL_MEDIA_DIR: /var/lib/wk-enhanced-api/media

    # Bind-mount the writable state. Source defaults to `./.compose-data`
    # (gitignored, auto-created by Docker Desktop on first `up`) so local
    # bring-up from a fresh checkout works without any host-side prep;
    # data is inspectable from Finder under the repo. Prod's systemd unit
    # overrides DATA_DIR to `/var/lib/wk-enhanced-api` (matching the
    # container-side path) so DATABASE_FILE addresses the same bytes
    # whether the operator reads them via `docker exec` or directly off
    # the droplet's filesystem.
    #
    # uid 1000 must be able to write to the source. Docker Desktop on
    # macOS handles uid translation through osxfs/gRPC-FUSE transparently.
    # On Linux pre-create with `sudo install -d -o 1000 -g 1000 <path>`
    # if your shell uid isn't 1000.
    volumes:
      - ${DATA_DIR:-./.compose-data}:/var/lib/wk-enhanced-api

    # Logging: keep the default json-file driver (journald-compatible via
    # `docker logs`) but cap rotation so a runaway log doesn't fill the
    # droplet. 10MB × 3 files = 30MB ceiling per container.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
