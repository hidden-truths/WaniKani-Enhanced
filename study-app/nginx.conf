# nginx config for the static 日常日本語 build. Mounted at
# /etc/nginx/conf.d/default.conf in the runtime image.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite emits content-hashed asset filenames (index-<hash>.js/.css), so they
    # never change for a given URL — cache them hard at the edge + browser.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html references the hashed asset names, so it MUST never be stale —
    # a redeploy changes the hashes and a cached index.html would point at gone files.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The app is single-page (tabs, no client-side routing), but fall back to
    # index.html for any unknown path so a refresh / deep link still loads the app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
